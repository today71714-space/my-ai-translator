<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 雙欄即時翻譯機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording { animation: pulse-red 2s infinite; background-color: #ef4444 !important; }
        .chat-container { height: calc(100- 180px); }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden font-sans text-slate-900">

    <button onclick="updateApiKey()" class="fixed top-4 right-4 z-50 bg-white/50 hover:bg-white px-3 py-1.5 rounded-full text-xs text-slate-500 shadow-sm transition-all border border-slate-200">
        <i class="fas fa-key mr-1"></i>設定 API Key
    </button>

    <div class="flex h-full flex-col md:flex-row">
        
        <div class="w-full md:w-1/3 p-6 flex flex-col border-r border-slate-200 bg-white z-10 shadow-lg">
            <header class="mb-8">
                <h1 class="text-2xl font-bold text-indigo-600 flex items-center">
                    <i class="fas fa-microphone-alt mr-3"></i>即時翻譯控制台
                </h1>
                <p class="text-sm text-slate-400 mt-1">混合偵測：英、日、中</p>
            </header>

            <div class="flex-1 flex flex-col justify-center items-center gap-6">
                <div id="statusIndicator" class="flex items-center text-sm font-medium px-4 py-2 rounded-full bg-slate-100 text-slate-500">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300 mr-2"></span>
                    <span id="statusText">等待初始化...</span>
                </div>

                <button id="recordBtn" class="w-28 h-28 rounded-full bg-indigo-600 text-white flex items-center justify-center shadow-2xl transition-all hover:bg-indigo-700 active:scale-95">
                    <i id="micIcon" class="fas fa-microphone text-4xl"></i>
                </button>
                
                <div class="text-center">
                    <p id="instructionText" class="text-slate-600 font-bold">點擊開始錄音</p>
                    <p class="text-xs text-slate-400 mt-2">AI 會自動辨識語音並翻譯成中文</p>
                </div>
            </div>

            <div class="mt-auto p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">當前辨識內容</p>
                <p id="liveTranscript" class="text-indigo-600 italic min-h-[3rem] text-sm leading-relaxed"></p>
            </div>
        </div>

        <div class="w-full md:w-2/3 flex flex-col bg-slate-50 relative">
            <div class="p-6 border-b border-slate-200 bg-white/50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-700 flex items-center">
                    <i class="fas fa-stream mr-2 text-indigo-500"></i>即時翻譯串流
                </h2>
                <button id="clearHistory" class="text-xs text-slate-400 hover:text-red-500">
                    <i class="fas fa-trash-alt mr-1"></i>清空內容
                </button>
            </div>

            <div id="historyList" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-slate-300">
                    <i class="fas fa-comments text-5xl mb-4 opacity-20"></i>
                    <p>等待語音輸入中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- API Key & 初始化 ---
        let apiKey = localStorage.getItem('gemini_api_key');
        if (!apiKey) {
            apiKey = prompt("請輸入您的 Gemini API Key 以啟動 AI 翻譯功能：");
            if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
        }

        function updateApiKey() {
            const newKey = prompt("請輸入新的 Gemini API Key:", apiKey || "");
            if (newKey) {
                localStorage.setItem('gemini_api_key', newKey);
                location.reload();
            }
        }

        // --- 語音辨識設定 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRecording = false;
        let recognition = null;

        const recordBtn = document.getElementById('recordBtn');
        const micIcon = document.getElementById('micIcon');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const liveTranscript = document.getElementById('liveTranscript');
        const historyList = document.getElementById('historyList');
        const emptyState = document.getElementById('emptyState');

        if (!SpeechRecognition) {
            alert("瀏覽器不支援語音辨識，請使用 Chrome。");
        } else {
            initRecognition();
        }

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.continuous = true; // 持續錄音
            recognition.interimResults = true;
            recognition.lang = 'en-US'; // 雖然設為英文，但目前 Chrome 會自動嘗試偵測混合語言

            recognition.onstart = () => {
                isRecording = true;
                recordBtn.classList.add('recording');
                micIcon.className = 'fas fa-stop text-4xl';
                updateStatus(true, "正在聆聽...");
            };

            recognition.onresult = (event) => {
                let interim = '';
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        final = event.results[i][0].transcript;
                        processTranslation(final);
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                liveTranscript.innerText = interim || final;
            };

            recognition.onerror = (e) => {
                console.error(e);
                if(e.error === 'not-allowed') alert("請允許麥克風存取。");
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) recognition.start();
            };

            updateStatus(false, "準備就緒");
        }

        function toggleRecording() {
            if (isRecording) stopRecording(); else recognition.start();
        }

        function stopRecording() {
            isRecording = false;
            recognition.stop();
            recordBtn.classList.remove('recording');
            micIcon.className = 'fas fa-microphone text-4xl';
            updateStatus(false, "已停止");
        }

        function updateStatus(active, text) {
            statusDot.className = `w-2 h-2 rounded-full mr-2 ${active ? 'bg-red-500' : 'bg-green-500'}`;
            statusText.textContent = text;
        }

        // --- AI 翻譯處理 ---
        async function processTranslation(text) {
            if (!text.trim()) return;

            emptyState.classList.add('hidden');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const card = createCard(text, time);
            historyList.appendChild(card);
            historyList.scrollTop = historyList.scrollHeight;

            const resultEl = card.querySelector('.trans-res');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一個即時翻譯助手。請判斷以下輸入的語言（英、日、中），並將其翻譯成流暢的「繁體中文」。如果是中文，請優化語氣。輸入內容："${text}"。請只輸出翻譯結果。` }] }]
                    })
                });

                const data = await response.json();
                resultEl.innerText = data.candidates[0].content.parts[0].text.trim();
                resultEl.classList.remove('animate-pulse', 'text-slate-300');
            } catch (err) {
                resultEl.innerText = "翻譯失敗，請檢查 API Key。";
            }
        }

        function createCard(original, time) {
            const div = document.createElement('div');
            div.className = 'flex flex-col gap-2 max-w-[90%] self-start';
            div.innerHTML = `
                <span class="text-[10px] font-bold text-slate-400 ml-2">${time}</span>
                <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-200">
                    <p class="text-xs text-slate-400 mb-1 font-semibold uppercase">原始語音</p>
                    <p class="text-slate-700 mb-3">${original}</p>
                    <div class="pt-3 border-t border-slate-100">
                        <p class="text-xs text-indigo-400 mb-1 font-semibold uppercase">中文翻譯</p>
                        <p class="trans-res text-indigo-600 font-medium animate-pulse">正在翻譯中...</p>
                    </div>
                </div>
            `;
            return div;
        }

        recordBtn.addEventListener('click', toggleRecording);
        document.getElementById('clearHistory').addEventListener('click', () => {
            historyList.innerHTML = '';
            emptyState.classList.remove('hidden');
        });
    </script>
</body>
</html>
