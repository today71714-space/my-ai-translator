<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 即時語音翻譯機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording {
            animation: pulse-red 2s infinite;
            background-color: #ef4444 !important;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">
                <i class="fas fa-language mr-2"></i>AI 即時語音翻譯
            </h1>
            <p class="text-slate-500">支援英文、日文即時轉換為繁體中文</p>
        </header>

        <!-- Main Controller -->
        <div class="glass-morphism rounded-3xl p-6 shadow-xl mb-8">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <div class="flex items-center gap-2">
                    <label class="text-sm font-semibold text-slate-700">辨識語言：</label>
                    <select id="languageSelect" class="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="en-US">英文 (English)</option>
                        <option value="ja-JP">日文 (日本語)</option>
                    </select>
                </div>
                <div id="statusIndicator" class="flex items-center text-sm text-slate-500">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300 mr-2"></span>
                    <span id="statusText">等待初始化...</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center justify-center py-10 border-2 border-dashed border-slate-200 rounded-2xl mb-6 relative">
                <button id="recordBtn" class="w-20 h-20 rounded-full bg-indigo-600 text-white flex items-center justify-center shadow-lg transition-all hover:bg-indigo-700 focus:outline-none mb-4">
                    <i id="micIcon" class="fas fa-microphone text-2xl"></i>
                </button>
                <p id="instructionText" class="text-slate-600 font-medium text-center">點擊按鈕開始錄音</p>
                <p id="liveTranscript" class="mt-4 text-indigo-500 italic min-h-[1.5rem] px-4 text-center max-w-full break-words"></p>
                
                <!-- Helper for local file issue -->
                <div id="localFileWarning" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center p-6 text-center z-10 rounded-2xl">
                    <i class="fas fa-shield-alt text-red-500 text-3xl mb-3"></i>
                    <h3 class="font-bold text-red-600 mb-2">安全性限制</h3>
                    <p class="text-sm text-slate-600 mb-4">
                        Chrome 不允許在直接打開 HTML 檔案 (file://) 時使用麥克風。<br>
                        請點擊下方按鈕在線上環境測試，或將此檔案放在伺服器上。
                    </p>
                    <button onclick="window.location.reload()" class="bg-slate-200 px-4 py-2 rounded-lg text-sm font-medium">重試</button>
                </div>
            </div>
        </div>

        <!-- Translation Display -->
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold flex items-center">
                    <i class="fas fa-history mr-2 text-slate-400"></i>翻譯歷史
                </h2>
                <button id="clearHistory" class="text-sm text-slate-400 hover:text-red-500 transition-colors">
                    清除全部
                </button>
            </div>
            
            <div id="historyList" class="space-y-4">
                <div id="emptyState" class="text-center py-12 text-slate-400">
                    <i class="fas fa-comment-slash text-4xl mb-3 block"></i>
                    尚未有翻譯紀錄
                </div>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-4 rounded-2xl shadow-2xl hidden flex items-center gap-3 min-w-[300px] z-50">
        <i class="fas fa-exclamation-triangle text-xl"></i>
        <div class="flex-1">
            <p class="font-bold text-sm">操作失敗</p>
            <p id="errorMsg" class="text-xs opacity-90"></p>
        </div>
        <button onclick="document.getElementById('errorToast').classList.add('hidden')">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script>
        // --- Configuration ---
        const apiKey = ""; 
        let isRecording = false;
        let recognition = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'voice-translator';

        // --- DOM Elements ---
        const recordBtn = document.getElementById('recordBtn');
        const micIcon = document.getElementById('micIcon');
        const instructionText = document.getElementById('instructionText');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const liveTranscript = document.getElementById('liveTranscript');
        const historyList = document.getElementById('historyList');
        const emptyState = document.getElementById('emptyState');
        const languageSelect = document.getElementById('languageSelect');
        const clearHistoryBtn = document.getElementById('clearHistory');
        const errorToast = document.getElementById('errorToast');
        const errorMsg = document.getElementById('errorMsg');
        const localFileWarning = document.getElementById('localFileWarning');

        // Check if running on file system
        if (window.location.protocol === 'file:') {
            console.warn("Detected local file protocol. Mic may not work.");
        }

        // --- Speech Recognition Setup ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            showError("您的瀏覽器不支援語音辨識功能，請使用最新版 Chrome 或 Edge。");
            recordBtn.disabled = true;
            recordBtn.classList.add('opacity-50', 'cursor-not-allowed');
            updateStatus(false, "瀏覽器不支援");
        } else {
            initRecognition();
            updateStatus(false, "準備就緒");
        }

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = languageSelect.value;

            recognition.onstart = () => {
                isRecording = true;
                recordBtn.classList.add('recording');
                micIcon.className = 'fas fa-stop text-2xl';
                instructionText.innerText = "正在聆聽中...";
                updateStatus(true, "正在錄音...");
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                liveTranscript.innerText = interimTranscript || finalTranscript;

                if (finalTranscript) {
                    processTranslation(finalTranscript, recognition.lang);
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error", event.error);
                
                if (event.error === 'not-allowed' || event.error === 'audio-capture') {
                    if (window.location.protocol === 'file:') {
                        localFileWarning.classList.remove('hidden');
                    }
                    showError("麥克風存取被拒絕。請確保已開啟網頁權限，且不是直接從本地點開 HTML 檔。");
                } else if (event.error !== 'no-speech') {
                    showError("辨識失敗: " + event.error);
                }
                
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    try {
                        recognition.start();
                    } catch(e) {
                        stopRecording();
                    }
                } else {
                    stopRecording();
                }
            };
        }

        // --- Functions ---

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            if (!recognition) return;
            recognition.lang = languageSelect.value;
            try {
                recognition.start();
            } catch (e) {
                console.error("Start Error", e);
                initRecognition(); // 重置物件
                recognition.start();
            }
        }

        function stopRecording() {
            isRecording = false;
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            recordBtn.classList.remove('recording');
            micIcon.className = 'fas fa-microphone text-2xl';
            instructionText.innerText = "點擊按鈕開始錄音";
            updateStatus(false, "準備就緒");
            liveTranscript.innerText = "";
        }

        function updateStatus(active, text) {
            statusDot.className = `w-2 h-2 rounded-full mr-2 ${active ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-green-500'}`;
            statusText.textContent = text;
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => {
                errorToast.classList.add('hidden');
            }, 6000);
        }

        async function processTranslation(text, sourceLang) {
            if (!text.trim()) return;

            const timestamp = new Date().toLocaleTimeString();
            const card = createTranslationCard(text, "翻譯中...", timestamp);
            historyList.prepend(card);
            emptyState.classList.add('hidden');

            const resultElement = card.querySelector('.translation-result');

            try {
                const translatedText = await callGeminiAPI(text, sourceLang);
                resultElement.innerText = translatedText;
                resultElement.classList.remove('text-slate-400', 'italic');
                resultElement.classList.add('text-indigo-700', 'font-medium');
            } catch (error) {
                resultElement.innerText = "翻譯失敗，請再試一次。";
                resultElement.classList.add('text-red-500');
            }
        }

        async function callGeminiAPI(text, sourceLang, retryCount = 0) {
            const systemPrompt = `You are a professional real-time translator. Translate the following user input into Traditional Chinese (Taiwan). Provide ONLY the translation.`;
            const userQuery = `Language: ${sourceLang}. Translate: "${text}"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) throw new Error('API Request Failed');
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "無法辨識翻譯內容";
            } catch (error) {
                if (retryCount < 5) {
                    await new Promise(r => setTimeout(r, Math.pow(2, retryCount) * 1000));
                    return callGeminiAPI(text, sourceLang, retryCount + 1);
                }
                throw error;
            }
        }

        function createTranslationCard(original, translated, time) {
            const div = document.createElement('div');
            div.className = 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-2 transition-all hover:shadow-md';
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">${time}</span>
                    <button class="text-slate-300 hover:text-slate-500" onclick="this.closest('.bg-white').remove(); checkEmpty();">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="flex items-start gap-3">
                    <div class="mt-1 w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0 text-[10px] font-bold text-slate-500">原</div>
                    <p class="text-slate-700 leading-relaxed">${original}</p>
                </div>
                <div class="flex items-start gap-3 mt-1 pt-3 border-t border-slate-50">
                    <div class="mt-1 w-6 h-6 rounded-full bg-indigo-50 flex items-center justify-center flex-shrink-0 text-[10px] font-bold text-indigo-500">譯</div>
                    <p class="translation-result text-slate-400 italic leading-relaxed">${translated}</p>
                </div>
            `;
            return div;
        }

        function checkEmpty() {
            if (historyList.querySelectorAll('.bg-white').length === 0) {
                emptyState.classList.remove('hidden');
            }
        }

        // --- Event Listeners ---
        recordBtn.addEventListener('click', toggleRecording);
        languageSelect.addEventListener('change', () => {
            if (isRecording) {
                stopRecording();
                setTimeout(startRecording, 300);
            }
        });
        clearHistoryBtn.addEventListener('click', () => {
            historyList.querySelectorAll('.bg-white').forEach(card => card.remove());
            emptyState.classList.remove('hidden');
        });

    </script>
</body>
</html>
